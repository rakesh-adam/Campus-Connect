<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4E9F2;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="2" fill="#0066CC" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Background gradient -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Decorative dots pattern -->
  <rect width="1200" height="800" fill="url(#dots)"/>
  
  <!-- Top right book stack -->
  <g opacity="0.15">
    <rect x="900" y="50" width="80" height="120" fill="#0066CC" rx="5"/>
    <rect x="920" y="30" width="80" height="120" fill="#0052A3" rx="5"/>
    <rect x="940" y="10" width="80" height="120" fill="#003D7A" rx="5"/>
  </g>
  
  <!-- Bottom left graduation cap -->
  <g opacity="0.15">
    <circle cx="80" cy="680" r="30" fill="#0066CC"/>
    <path d="M 50 680 L 80 650 L 110 680 Z" fill="#0052A3"/>
    <rect x="70" y="680" width="20" height="80" fill="#0066CC"/>
  </g>
  
  <!-- Center top - pencil and ruler -->
  <g opacity="0.12" transform="translate(600, 100)">
    <rect x="-60" y="-5" width="120" height="10" fill="#0066CC" rx="5"/>
    <polygon points="50,0 60,-8 60,8" fill="#FFD700"/>
  </g>
  
  <!-- Right side - chart/graph -->
  <g opacity="0.1" transform="translate(1050, 400)">
    <rect x="0" y="60" width="20" height="120" fill="#0066CC"/>
    <rect x="30" y="40" width="20" height="140" fill="#0052A3"/>
    <rect x="60" y="20" width="20" height="160" fill="#003D7A"/>
    <rect x="90" y="50" width="20" height="130" fill="#0066CC"/>
  </g>
  
  <!-- Left side - document stack -->
  <g opacity="0.12" transform="translate(100, 300)">
    <rect x="0" y="0" width="100" height="140" fill="none" stroke="#0066CC" stroke-width="3" rx="5"/>
    <line x1="0" y1="35" x2="100" y2="35" stroke="#0066CC" stroke-width="2"/>
    <line x1="0" y1="70" x2="100" y2="70" stroke="#0066CC" stroke-width="2"/>
    <line x1="0" y1="105" x2="100" y2="105" stroke="#0066CC" stroke-width="2"/>
  </g>
  
  <!-- Bottom right - circle with checkmark -->
  <g opacity="0.13" transform="translate(950, 680)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#0066CC" stroke-width="3"/>
    <path d="M -15 0 L -5 10 L 15 -10" stroke="#0066CC" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Top left - lightbulb (idea) -->
  <g opacity="0.11" transform="translate(150, 120)">
    <circle cx="0" cy="-15" r="20" fill="none" stroke="#0066CC" stroke-width="3"/>
    <rect x="-15" y="5" width="30" height="15" fill="#0066CC" rx="3"/>
    <line x1="-8" y1="20" x2="-8" y2="35" stroke="#0066CC" stroke-width="2"/>
    <line x1="0" y1="20" x2="0" y2="35" stroke="#0066CC" stroke-width="2"/>
    <line x1="8" y1="20" x2="8" y2="35" stroke="#0066CC" stroke-width="2"/>
  </g>
</svg>